version: '3.9'

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: flashcard
      POSTGRES_PASSWORD: flashcard
      POSTGRES_DB: flashcard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashcard"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql://flashcard:flashcard@db:5432/flashcard
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres_data:
